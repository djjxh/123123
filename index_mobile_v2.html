<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>工时管家 Mobile V2｜交付与人员雷达</title><link rel="icon" href="data:,"><style>:root{--ink:#15171c;--paper:#f7f7f5;--card:#fff;--line:#e6e3dc;--muted:#6b7280;--blue:#0a84ff;--blue-soft:#eaf3ff;--red:#d92d20;--red-soft:#fef3f2;--green:#0f9f6e;--green-soft:#e7f8f1;--gold:#b7791f;--gold-soft:#fff7e6;--purple:#5e5ce6;--purple-soft:#f0f0ff;--shadow:0 8px 24px rgba(0,0,0,.07);--bottom:82px}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:#101217;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",Arial,sans-serif;overflow-x:hidden}body{display:flex;justify-content:center}.app{width:100%;max-width:430px;min-height:100dvh;background:var(--paper);position:relative;padding-bottom:calc(var(--bottom) + env(safe-area-inset-bottom,0px));overflow-x:hidden}.top{position:sticky;top:0;z-index:30;background:rgba(247,247,245,.94);backdrop-filter:blur(18px);padding:calc(10px + env(safe-area-inset-top,0px)) 20px 12px;border-bottom:1px solid rgba(230,227,220,.65)}.status{display:flex;justify-content:space-between;align-items:center;font-size:12px;font-weight:700;margin-bottom:12px}.island{width:122px;height:34px;background:#0b0d12;border-radius:18px}.brand{display:flex;justify-content:space-between;align-items:flex-end}.brand h1{font-size:19px;line-height:1.1;margin:0;font-weight:850}.brand span{font-size:12px;color:var(--muted);font-weight:700}.page{display:none;padding:18px 20px 28px}.page.active{display:block}.hero-title{font-size:25px;line-height:1.18;margin:0 0 6px;font-weight:900;letter-spacing:-.02em}.sub{font-size:13px;line-height:1.55;color:var(--muted);margin:0 0 14px}.pill-row{display:flex;gap:8px;overflow-x:auto;padding:2px 0 12px;scrollbar-width:none}.pill-row::-webkit-scrollbar{display:none}.pill{border:0;border-radius:999px;min-height:32px;padding:0 12px;font-size:12px;font-weight:800;white-space:nowrap;background:#fff;color:var(--muted);border:1px solid var(--line)}.pill.active{background:var(--ink);color:#fff;border-color:var(--ink)}.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0 16px}.kpi{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px 10px;box-shadow:var(--shadow)}.kpi small{display:block;color:var(--muted);font-size:10px;font-weight:700}.kpi b{display:block;font-size:24px;line-height:1.1;margin-top:4px}.card{background:#fff;border:1px solid var(--line);border-radius:24px;margin:0 0 12px;box-shadow:var(--shadow);padding:18px;position:relative;overflow:hidden}.card:after{content:"";position:absolute;right:18px;top:18px;width:18px;height:18px;border-radius:50%;background:var(--blue)}.card.red:after{background:var(--red)}.card.gold:after{background:var(--gold)}.card.green:after{background:var(--green)}.card.purple:after{background:var(--purple)}.card h3{font-size:17px;line-height:1.25;margin:0 34px 8px 0;font-weight:850}.card p{font-size:12px;line-height:1.65;color:var(--muted);margin:0;white-space:pre-line}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:14px}.actions.one{grid-template-columns:1fr}.btn{border:0;border-radius:16px;min-height:42px;padding:0 12px;font-size:13px;font-weight:850;background:var(--ink);color:#fff}.btn.blue{background:var(--blue)}.btn.red{background:var(--red)}.btn.green{background:var(--green)}.btn.light{background:#f0f1f3;color:var(--ink)}.tag{display:inline-flex;align-items:center;border-radius:999px;padding:5px 10px;font-size:11px;font-weight:850;margin-right:6px}.tag.red{color:var(--red);background:var(--red-soft)}.tag.blue{color:var(--blue);background:var(--blue-soft)}.tag.green{color:var(--green);background:var(--green-soft)}.tag.gold{color:var(--gold);background:var(--gold-soft)}.tag.purple{color:var(--purple);background:var(--purple-soft)}.search{width:100%;height:46px;border:1px solid var(--line);border-radius:17px;background:#fff;font-size:14px;padding:0 14px;outline:none;margin:4px 0 12px}.timeline{margin-top:13px}.tl-head{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);font-weight:700}.track{height:8px;background:#f0f1f3;border-radius:999px;margin-top:8px;overflow:hidden}.fill{height:100%;border-radius:999px;background:var(--blue)}.fill.red{background:var(--red)}.fill.gold{background:var(--gold)}.date-grid{display:grid;gap:9px;margin-top:12px}.date-row{display:grid;grid-template-columns:76px 86px 1fr;gap:8px;align-items:center;padding:10px;background:#fafafa;border:1px solid #eee;border-radius:15px}.date-row small{color:var(--muted);font-weight:800}.date-row b{font-size:17px}.date-row span{font-size:12px;color:var(--muted);line-height:1.4}.person-card .line{display:grid;grid-template-columns:1fr 72px 52px;gap:8px;margin-top:9px;font-size:12px}.person-card .line b{font-size:13px}.person-card .line span{color:var(--muted)}.more-row{height:54px;background:#fff;border:1px solid var(--line);border-radius:18px;display:flex;align-items:center;justify-content:space-between;padding:0 18px;margin-bottom:10px;box-shadow:var(--shadow);font-weight:800}.more-row span{color:var(--muted);font-size:22px}.bottom{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:430px;height:calc(var(--bottom) + env(safe-area-inset-bottom,0px));background:rgba(255,255,255,.96);backdrop-filter:blur(18px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(4,1fr);z-index:50;padding-bottom:env(safe-area-inset-bottom,0px)}.tab{border:0;background:transparent;color:#9ca3af;font-size:10px;font-weight:850;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}.tab i{font-style:normal;font-size:19px}.tab.active{color:var(--ink)}.sheet-mask{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:80;display:none}.sheet-mask.show{display:block}.sheet{position:fixed;left:50%;bottom:0;transform:translateX(-50%) translateY(105%);width:100%;max-width:430px;max-height:88dvh;overflow:auto;background:var(--paper);z-index:90;border-radius:28px 28px 0 0;padding:12px 20px calc(22px + env(safe-area-inset-bottom,0px));transition:transform .22s ease;box-shadow:0 -18px 50px rgba(0,0,0,.18)}.sheet.show{transform:translateX(-50%) translateY(0)}.handle{width:42px;height:5px;background:#d6d3cc;border-radius:999px;margin:0 auto 16px}.sheet h2{font-size:24px;margin:0 0 6px}.sheet .big-date{background:var(--ink);color:#fff;border-radius:28px;padding:24px;margin:14px 0}.big-date b{font-size:40px;display:block}.big-date span{font-size:14px;color:#d1d5db}.empty{padding:34px 10px;text-align:center;color:var(--muted);font-size:13px}.toast{position:fixed;left:20px;right:20px;bottom:calc(var(--bottom) + 16px);z-index:120;background:var(--ink);color:#fff;border-radius:18px;padding:12px 16px;text-align:center;font-size:13px;font-weight:800;opacity:0;transform:translateY(8px);transition:.2s}.toast.show{opacity:1;transform:translateY(0)}@media(min-width:760px){body{padding:24px;background:radial-gradient(circle at 20% 0,#26324d,#101217 45%,#06070a)}.app{border-radius:38px;min-height:852px;box-shadow:0 38px 110px rgba(0,0,0,.58);overflow:hidden}.bottom{position:absolute;left:0;transform:none}.sheet,.sheet-mask{position:absolute;left:0;transform:translateY(105%)}.sheet.show{transform:translateY(0)}}</style></head><body><div class="app" id="app"><div class="top"><div class="status"><span id="clock">9:41</span><div class="island"></div><span>5G ▰</span></div><div class="brand"><h1 id="title">今日</h1><span>三厘社</span></div></div><section class="page active" id="page-today"><h2 class="hero-title">老板现在问，<br>你能立刻答哪几个？</h2><p class="sub">手机端不做完整后台，只做交付时间对齐与人员负载判断。</p><div class="kpis"><div class="kpi"><small>交付临近</small><b id="kpiDue">0</b></div><div class="kpi"><small>预排待确认</small><b id="kpiPre">0</b></div><div class="kpi"><small>人员过载</small><b id="kpiOver">0</b></div></div><div id="todayList"></div></section><section class="page" id="page-delivery"><h2 class="hero-title">所有项目<br>什么时候结束</h2><p class="sub">合同项目与预排项目一起看。老板问项目节点时，直接搜索项目名。</p><input class="search" id="projectSearch" placeholder="搜索项目名、负责人、阶段"><div class="pill-row" id="deliveryFilters"><button class="pill active" data-filter="all">全部</button><button class="pill" data-filter="contract">合同内</button><button class="pill" data-filter="pre">预排</button><button class="pill" data-filter="risk">逾期风险</button></div><div id="deliveryList"></div></section><section class="page" id="page-people"><h2 class="hero-title">每个人身上<br>有哪些项目</h2><p class="sub">按人查看：项目、阶段、交付/释放时间、是否过载。</p><div class="pill-row" id="peopleFilters"><button class="pill active" data-role="all">全部</button><button class="pill" data-role="方案">方案</button><button class="pill" data-role="深化">深化</button><button class="pill" data-role="over">过载</button></div><div id="peopleList"></div></section><section class="page" id="page-more"><h2 class="hero-title">更多</h2><p class="sub">AI 审图不再占手机一级导航。手机只保留入口和待确认提醒，真正审图建议在电脑或平板上做。</p><div id="moreList"></div></section><nav class="bottom"><button class="tab active" data-page="today"><i>●</i>今日</button><button class="tab" data-page="delivery"><i>◷</i>交付</button><button class="tab" data-page="people"><i>◇</i>人员</button><button class="tab" data-page="more"><i>☰</i>更多</button></nav><div class="sheet-mask" id="mask"></div><div class="sheet" id="sheet"><div class="handle"></div><div id="sheetContent"></div></div><div class="toast" id="toast"></div></div><script>const projects=[{id:'p1',name:'植物园项目',kind:'contract',delivery:'2026-05-18',deliveryLabel:'5月18日',deliverable:'施工图 CAD+PDF',preEnd:'5月16日',access:'5月22日',opening:'6月30日',stage:'方案未锁定',risk:'high',ownerPlan:'王五',ownerTech:'张三',issue:'方案未最终锁定，施工图时间被压缩'},{id:'p2',name:'ONIONIO 常州店',kind:'pre',delivery:'2026-05-24',deliveryLabel:'5月24日',deliverable:'预排结束',preEnd:'5月24日',access:'5月6日',opening:'6月18日',stage:'深化中',risk:'normal',ownerPlan:'赵六',ownerTech:'李四',issue:'节点正常，需确认施工图输出时间'},{id:'p3',name:'烘焙店项目',kind:'contract',delivery:'2026-05-28',deliveryLabel:'5月28日',deliverable:'方案+施工图',preEnd:'5月26日',access:'6月1日',opening:'7月5日',stage:'材料节点复核',risk:'mid',ownerPlan:'王五',ownerTech:'张三',issue:'风炉高温区域材料方案未定'},{id:'p4',name:'快闪店项目',kind:'pre',delivery:'2026-05-10',deliveryLabel:'5月10日',deliverable:'深化收尾',preEnd:'5月10日',access:'5月12日',opening:'5月30日',stage:'深化收尾',risk:'mid',ownerPlan:'赵六',ownerTech:'张三',issue:'深化负责人排期冲突，建议换人收尾'},{id:'p5',name:'餐饮A 项目',kind:'contract',delivery:'2026-05-21',deliveryLabel:'5月21日',deliverable:'概念方案',preEnd:'5月20日',access:'6月10日',opening:'7月20日',stage:'概念方案',risk:'normal',ownerPlan:'王五',ownerTech:'李四',issue:'方案推进正常'}];const people=[{name:'张三',role:'深化设计',cap:2,items:[['植物园项目','施工图','5/18','high'],['烘焙店项目','节点','5/28','mid'],['快闪店项目','收尾','5/10','mid']]},{name:'李四',role:'深化设计',cap:2,items:[['ONIONIO 常州店','深化','5/24','normal'],['空档','可接新项目','5/25','normal']]},{name:'王五',role:'方案设计',cap:2,items:[['植物园项目','方案调整','5/09','high'],['餐饮A 项目','概念','5/21','normal']]},{name:'赵六',role:'方案设计',cap:2,items:[['ONIONIO 常州店','方案配合','5/12','normal']]}];const more=['AI审图测试台','错题库 / 规则库','导入赫思 Excel','项目复盘导入','经济数据 / 回款','员工管理','系统自检'];const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));function riskClass(r){return r==='high'?'red':r==='mid'?'gold':'green'}function riskText(r){return r==='high'?'高风险':r==='mid'?'卡点':'正常'}function kindText(k){return k==='contract'?'合同项目':'预排项目'}function daysLeft(date){return Math.ceil((new Date(date)-new Date())/86400000)}function progress(date){const d=daysLeft(date);return Math.max(12,Math.min(96,100-d*3))}function toast(t){const el=$('#toast');el.textContent=t;el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1600)}function cardProject(p,mode='list'){const rc=riskClass(p.risk),pct=progress(p.delivery);return `<article class="card ${rc}" onclick="openProject('${p.id}')"><h3>${p.name}</h3><p>${p.kind==='contract'?'合同交付':'预排结束'}：${p.deliveryLabel} ${p.deliverable}\n预计接铺：${p.access}｜预计开业：${p.opening}\n当前阶段：${p.stage}</p><div style="margin-top:11px"><span class="tag ${rc}">${riskText(p.risk)}</span><span class="tag blue">${kindText(p.kind)}</span></div><div class="timeline"><div class="tl-head"><span>进度</span><span>${p.deliveryLabel}</span></div><div class="track"><div class="fill ${rc}" style="width:${pct}%"></div></div></div>${mode==='today'?'<div class="actions"><button class="btn '+(p.risk==='high'?'red':'blue')+'" onclick="event.stopPropagation();openProject(\''+p.id+'\')">打开交付卡</button><button class="btn" onclick="event.stopPropagation();copyBrief(\''+p.id+'\')">同步口径</button></div>':''}</article>`}function renderToday(){const due=projects.filter(p=>daysLeft(p.delivery)<=20).length,pre=projects.filter(p=>p.kind==='pre').length,over=people.filter(x=>x.items.filter(i=>i[0]!=='空档').length>x.cap).length;$('#kpiDue').textContent=due;$('#kpiPre').textContent=pre;$('#kpiOver').textContent=over;const hot=[projects.find(p=>p.id==='p1'),projects.find(p=>p.id==='p2')].map(p=>cardProject(p,'today')).join(''),op=people.find(p=>p.name==='张三');$('#todayList').innerHTML=hot+personCard(op,true)+'<p class="sub" style="margin-top:12px">首页只回答：今天哪些时间和人需要你对齐。</p>'}let deliveryFilter='all';function renderDelivery(){const q=($('#projectSearch').value||'').trim().toLowerCase();let arr=projects.filter(p=>!q||[p.name,p.stage,p.ownerPlan,p.ownerTech].join(' ').toLowerCase().includes(q));if(deliveryFilter==='contract')arr=arr.filter(p=>p.kind==='contract');if(deliveryFilter==='pre')arr=arr.filter(p=>p.kind==='pre');if(deliveryFilter==='risk')arr=arr.filter(p=>p.risk!=='normal');arr.sort((a,b)=>new Date(a.delivery)-new Date(b.delivery));$('#deliveryList').innerHTML=arr.length?arr.map(p=>cardProject(p)).join(''):'<div class="empty">没有匹配项目</div>'}function personCard(p,compact=false){const count=p.items.filter(i=>i[0]!=='空档').length,over=count>p.cap,cls=over?'red':'green';return `<article class="card ${cls} person-card" onclick="openPerson('${p.name}')"><h3>${p.name}｜${p.role}</h3><p>${over?'超过建议上限，新增任务需拆分或换人':'负载正常，可作为备选人选'}</p><div style="margin-top:10px"><span class="tag ${cls}">${over?'过载 '+count+'项':'正常 '+count+'项'}</span></div>${p.items.map(i=>`<div class="line"><b>${i[0]}</b><span>${i[1]}</span><span>${i[2]}</span></div>`).join('')}${compact?'<div class="actions one"><button class="btn" onclick="event.stopPropagation();openPerson(\''+p.name+'\')">查看人员排期</button></div>':''}</article>`}let peopleFilter='all';function renderPeople(){let arr=people.slice();if(peopleFilter==='方案')arr=arr.filter(p=>p.role.includes('方案'));if(peopleFilter==='深化')arr=arr.filter(p=>p.role.includes('深化'));if(peopleFilter==='over')arr=arr.filter(p=>p.items.filter(i=>i[0]!=='空档').length>p.cap);$('#peopleList').innerHTML=arr.map(p=>personCard(p)).join('')}function renderMore(){$('#moreList').innerHTML=more.map((m,i)=>`<div class="more-row" onclick="moreAction('${m}')"><b>${m}</b><span>›</span></div>`).join('')+'<p class="sub" style="margin-top:14px">AI 审图适合电脑或平板，手机只保留待确认提醒和入口。</p>'}function openSheet(html){$('#sheetContent').innerHTML=html;$('#mask').classList.add('show');$('#sheet').classList.add('show')}function closeSheet(){$('#mask').classList.remove('show');$('#sheet').classList.remove('show')}function openProject(id){const p=projects.find(x=>x.id===id),rc=riskClass(p.risk);openSheet(`<h2>${p.name}</h2><p class="sub">老板问“什么时候结束”，这里一屏回答。</p><div class="big-date"><b>${p.deliveryLabel}</b><span>${p.kind==='contract'?'合同约定':'预排节点'}：${p.deliverable}</span></div><div class="date-grid"><div class="date-row"><small>合同交付</small><b>${p.kind==='contract'?p.deliveryLabel:'—'}</b><span>${p.kind==='contract'?p.deliverable:'预排项目未签约'}</span></div><div class="date-row"><small>预计接铺</small><b>${p.access}</b><span>现场进场施工</span></div><div class="date-row"><small>预计开业</small><b>${p.opening}</b><span>施工完成 / 试营业</span></div><div class="date-row"><small>预排结束</small><b>${p.preEnd}</b><span>内部完成节点</span></div></div><article class="card ${rc}" style="margin-top:14px"><h3>当前阶段：${p.stage}</h3><p>${p.issue}\n方案负责人：${p.ownerPlan}｜深化负责人：${p.ownerTech}</p></article><div class="actions"><button class="btn blue" onclick="copyBrief('${p.id}')">复制老板口径</button><button class="btn light" onclick="closeSheet()">关闭</button></div>`)}function openPerson(name){const p=people.find(x=>x.name===name),count=p.items.filter(i=>i[0]!=='空档').length,over=count>p.cap;openSheet(`<h2>${p.name} / ${p.role}</h2><p class="sub">清楚看到他为什么能接或不能再加任务。</p><article class="card ${over?'red':'green'}"><h3>当前 ${count} 个进行中项目</h3><p>${over?'超过建议上限，新增任务需拆分或换人':'负载正常，可以作为备选人选'}</p></article>${p.items.map(i=>`<article class="card ${riskClass(i[3])}"><h3>${i[0]}</h3><p>阶段：${i[1]}\n交付/释放：${i[2]}</p></article>`).join('')}<div class="actions"><button class="btn" onclick="toast('已生成替代人选建议')">找替代人选</button><button class="btn blue" onclick="toast('已标记可拆分任务')">拆分任务</button></div>`)}function copyBrief(id){const p=projects.find(x=>x.id===id),msg=`${p.name}目前${p.kind==='contract'?'合同交付':'预排结束'}节点是${p.deliveryLabel}，内容为${p.deliverable}，预计${p.access}接铺，${p.opening}开业。当前阶段是${p.stage}，${p.issue}。`;navigator.clipboard&&navigator.clipboard.writeText(msg);toast('已复制老板口径')}function moreAction(m){if(m.includes('AI审图'))toast('AI审图已折叠到更多，建议电脑端处理');else if(m.includes('系统自检'))toast('系统自检：此移动版无接口报错');else toast(m+'：后续接入原系统功能')}function switchPage(name){$$('.page').forEach(p=>p.classList.remove('active'));$('#page-'+name).classList.add('active');$$('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===name));$('#title').textContent={today:'今日',delivery:'交付时间',people:'人员排期',more:'更多'}[name]}$$('.tab').forEach(t=>t.onclick=()=>switchPage(t.dataset.page));$('#mask').onclick=closeSheet;$('#projectSearch').oninput=renderDelivery;$$('#deliveryFilters .pill').forEach(b=>b.onclick=()=>{$$('#deliveryFilters .pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');deliveryFilter=b.dataset.filter;renderDelivery()});$$('#peopleFilters .pill').forEach(b=>b.onclick=()=>{$$('#peopleFilters .pill').forEach(x=>x.classList.remove('active'));b.classList.add('active');peopleFilter=b.dataset.role;renderPeople()});function tick(){const d=new Date();$('#clock').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}tick();setInterval(tick,30000);renderToday();renderDelivery();renderPeople();renderMore();</script></body></html>
