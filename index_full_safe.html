<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>设计项目控制台</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#1f2329}#appFrame{width:100%;height:100%;border:0;display:block}.fallback{position:fixed;left:16px;bottom:16px;z-index:10;background:rgba(255,255,255,.94);border:1px solid #e5e7eb;border-radius:12px;padding:10px 12px;font:13px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#1f2329;box-shadow:0 8px 24px rgba(0,0,0,.12);display:none}.fallback a{color:#3370ff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<iframe id="appFrame" src="index_full.html?v=20260507-login-safe2" title="设计项目控制台"></iframe>
<div class="fallback" id="fallback">登录补丁已启用。若页面仍无响应，<a href="index_reworked.html?v=login-fallback">打开旧完整版</a></div>
<script>
(function(){
  const SUPABASE_URL='https://bgjvuszufqbbialkyeiq.supabase.co';
  const SUPABASE_ANON_KEY='sb_publishable_2yQgdIPmNnxQRTswLSLSwQ_KFaIuUjv';
  const frame=document.getElementById('appFrame');
  const fallback=document.getElementById('fallback');
  let lastEmail='';
  function ensureSupabase(win,doc){
    return new Promise((resolve,reject)=>{
      if(win.supabase && win.supabase.createClient) return resolve();
      const s=doc.createElement('script');
      s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
      s.onload=()=>resolve();
      s.onerror=()=>reject(new Error('Supabase SDK 加载失败'));
      doc.head.appendChild(s);
    });
  }
  function showError(doc,msg){
    const el=doc.getElementById('loginError');
    if(el){el.textContent=msg;el.style.display='block';}
    else alert(msg);
  }
  function bindOpenFallback(){
    fallback.style.display='block';
    setTimeout(()=>fallback.style.display='none',6000);
  }
  async function patchLogin(){
    const win=frame.contentWindow;
    const doc=frame.contentDocument;
    if(!win||!doc) return;
    try{await ensureSupabase(win,doc);}catch(e){console.error(e)}
    win.SUPABASE_URL=win.SUPABASE_URL||SUPABASE_URL;
    win.SUPABASE_ANON_KEY=win.SUPABASE_ANON_KEY||SUPABASE_ANON_KEY;
    win.getSupabaseClient=win.getSupabaseClient||function(){
      if(win.__sbClient) return win.__sbClient;
      if(!win.supabase||!win.supabase.createClient) throw new Error('Supabase SDK 未加载');
      win.__sbClient=win.supabase.createClient(win.SUPABASE_URL,win.SUPABASE_ANON_KEY,{auth:{storage:win.localStorage,persistSession:true,autoRefreshToken:true,detectSessionInUrl:false,flowType:'pkce',storageKey:'design-console-auth'}});
      win.sb=win.__sbClient;
      return win.__sbClient;
    };
    win.loginWithPassword=async function(){
      const email=(doc.getElementById('loginEmail')?.value||'').trim();
      const password=doc.getElementById('loginPassword')?.value||'';
      if(!email){showError(doc,'请输入邮箱');return;}
      if(!password){showError(doc,'请输入密码');return;}
      lastEmail=email;
      const btn=doc.getElementById('loginBtn');
      const old=btn?btn.textContent:'登录';
      try{
        if(btn){btn.disabled=true;btn.textContent='登录中…';}
        const client=win.getSupabaseClient();
        const {data,error}=await client.auth.signInWithPassword({email,password});
        if(error){showError(doc,'登录失败：'+(error.message||'邮箱或密码错误'));return;}
        showError(doc,'登录成功，正在进入系统…');
        setTimeout(()=>{ frame.src='index_full.html?v=auth-reload-'+Date.now(); },500);
      }catch(e){
        console.error(e);
        showError(doc,'登录异常：'+(e.message||e));
      }finally{
        if(btn){btn.disabled=false;btn.textContent=old||'登录';}
      }
    };
    const form=doc.getElementById('loginStep1');
    const btn=doc.getElementById('loginBtn');
    const pwd=doc.getElementById('loginPassword');
    const emailInput=doc.getElementById('loginEmail');
    if(emailInput && lastEmail && !emailInput.value) emailInput.value=lastEmail;
    if(form) form.onsubmit=function(e){e.preventDefault();win.loginWithPassword();};
    if(btn) btn.onclick=function(e){e.preventDefault();win.loginWithPassword();};
    if(pwd) pwd.onkeydown=function(e){if(e.key==='Enter'){e.preventDefault();win.loginWithPassword();}};
    bindOpenFallback();
  }
  frame.addEventListener('load',()=>{setTimeout(patchLogin,200);setTimeout(patchLogin,1200);setTimeout(patchLogin,2500);});
})();
</script>
</body>
</html>
