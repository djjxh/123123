<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>工时管家 · 稳定增强版</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#1f2329;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif}iframe{width:100%;height:100%;border:0}.fab{position:fixed;right:22px;bottom:22px;z-index:9999;display:none;gap:10px}.fab.show{display:flex}.fab button,.btn{border:0;border-radius:999px;background:#1f2329;color:#fff;box-shadow:0 10px 28px rgba(0,0,0,.2);padding:11px 15px;font-size:13px;font-weight:700;cursor:pointer}.fab button.light,.btn.light{background:#fff;color:#1f2329;border:1px solid #e5e7eb}.mask{position:fixed;inset:0;background:rgba(17,24,39,.42);z-index:10000;display:none}.mask.show{display:block}.sheet{position:fixed;right:0;top:0;bottom:0;width:min(720px,96vw);background:#f5f6f7;z-index:10001;box-shadow:-18px 0 60px rgba(0,0,0,.25);transform:translateX(100%);transition:.22s;overflow:auto}.sheet.show{transform:translateX(0)}.hd{position:sticky;top:0;background:rgba(255,255,255,.94);border-bottom:1px solid #e5e7eb;padding:18px 22px;display:flex;justify-content:space-between;align-items:center}.hd h2{margin:0;font-size:20px}.close{border:0;background:#f1f3f5;border-radius:10px;width:36px;height:36px;font-size:22px;cursor:pointer}.body{padding:20px 22px 34px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;box-shadow:0 4px 18px rgba(31,35,41,.06);padding:16px;margin:0 0 12px}.card h3{margin:0 0 8px;font-size:15px}.muted{color:#646a73;font-size:12px;line-height:1.7}.kpi small{display:block;color:#646a73;font-size:11px}.kpi b{font-size:30px}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:11px;font-weight:700;margin:0 6px 6px 0;background:#eef1f5;color:#596273}.red{background:#ffecec;color:#c0392b}.gold{background:#fff4d6;color:#b7791f}.green{background:#e3f5e9;color:#2da44e}.row{border-top:1px solid #f0f1f3;padding-top:10px;margin-top:10px}.warn{background:#fff4d6;border-left:3px solid #b7791f;bo... [truncated]
</style></head><body>
<iframe id="app" src="index_reworked.html?v=closemodal-20260520a"></iframe>
<div class="fab" id="fab"><button class="light" onclick="openPanel('review')">AI审图</button><button onclick="openPanel('load')">人员负载</button></div>
<div class="mask" id="mask" onclick="closePanel()"></div><aside class="sheet" id="sheet"><div class="hd"><h2 id="title">增强功能</h2><button class="close" onclick="closePanel()">×</button></div><div class="body" id="body"></div></aside>
<script>
(function(){
const frame=document.getElementById('app');let data={users:[],projects:[],members:[],stages:[],rules:[],files:JSON.parse(localStorage.getItem('review_files_v2')||'[]')};
const SUPABASE_URL='https://bgjvuszufqbbialkyeiq.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_2yQgdIPmNnxQRTswLSLSwQ_KFaIuUjv';
let parentClient=null;
const TERM=/(done|completed|finished|closed|cancelled|archived|paused|已完成|完成|已完工|完工|已完结|完结|已结束|结案|归档|暂停|已暂停|取消|已取消|关闭)/i;
const ACT=/(active|ongoing|construction|risk|进行中|施工跟踪|施工中|方案阶段|施工图阶段|深化阶段|施工阶段|预排|预排中|已确认|未完成|未完工|未完结)/i;
function w(){return frame.contentWindow} function d(){return frame.contentDocument}
function makeClient(){if(parentClient)return parentClient;if(!window.supabase||!window.supabase.createClient)throw new Error('增强模块 SDK 未加载，请刷新页面');parentClient=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{auth:{storage:window.localStorage,persistSession:true,autoRefreshToken:true,detectSessionInUrl:false,flowType:'pkce',storageKey:'design-console-auth'}});return parentClient}
async function getClient(){let c=null;try{c=w().sb||w().__sbClient}catch(e){} if(c)return c;c=makeClient();let s=await c.auth.getSession();if(!s.data||!s.data.session)throw new Error('请先在主系统登录。若已登录，请刷新一次页面后再打开。');return c}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function terminal(s){s=String(s||''); if(ACT.test(s))return false; return TERM.test(s)}
function status(p){let r=data.stages.find(x=>String(x.project_id)==String(p.id));return (r&&r.stage)||p.stage||p.current_stage||p.project_status||p.status||''}
function active(p){return !terminal(status(p))}
function exclude(u){let t=[u.role,u.job_title,u.title,u.position,u.name].filter(Boolean).join(' ');return u.is_active===false||/离职|停用|设计总监|总监|老板|设计主管|主管|admin|owner|director|manager/i.test(t)}
function lim(u){let s=[u.job_title,u.role,u.title].filter(Boolean).join(' ');if(/高级深化|深化|施工图/i.test(s))return 4;if(/方案|执行|主案|设计/i.test(s))return 3;return 3}
async function load(){let c=await getClient();let a=await Promise.allSettled([c.from('users').select('*'),c.from('project_cost_summary').select('*'),c.from('project_members').select('*'),c.from('project_stage_updates').select('*'),c.from('review_rules').select('*')]);data.users=a[0].value?.data||[];data.projects=a[1].value?.data||[];data.members=a[2].value?.data||[];data.stages=a[3].value?.data||[];data.rules=a[4].value?.data||[]}
function personProjects(u){let rows=[],id=String(u.id||''),name=String(u.name||'');function push(p,role){if(!p||!active(p))return;let k=String(p.id||p.name);if(rows.some(x=>x.k==k))return;rows.push({k,name:p.name||p.project_name||'未命名项目',role:role||status(p)||'参与'})}data.members.forEach(m=>{if(String(m.employee_id||m.user_id)==id){let p=data.projects.find(x=>String(x.id)==String(m.project_id));push(p||{id:m.project_id,name:m.project_name,status:m.status},m.job_role||m.role)}});data.projects.forEach(p=>{let ids=[p.owner_id,p.employee_id,p.assignee_id,p.designer_id,p.concept_assignee_id,p.technical_assignee_id,p.responsible_id].filter(Boolean).map(String);let names=[p.owner_name,p.employee_name,p.assignee_name,p.designer_name,p.concept_assignee_name,p.technical_assignee_name,p.responsible_name,p.owner,p.manager].filter(Boolean).map(String);if(ids.includes(id)||names.includes(name))push(p,p.stage||p.current_stage)});return rows}
function rows(){return data.users.filter(u=>!exclude(u)).map(u=>{let ps=personProjects(u),l=lim(u);return{u,name:u.name||u.email||'未命名',role:u.job_title||u.role||'未设置',ps,count:ps.length,limit:l,over:ps.length>l,near:ps.length<=l&&ps.length>=Math.max(1,l-1)}}).sort((a,b)=>(+b.over-+a.over)||(b.count-a.count))}
function show(){document.getElementById('mask').classList.add('show');document.getElementById('sheet').classList.add('show')}window.closePanel=function(){document.getElementById('mask').classList.remove('show');document.getElementById('sheet').classList.remove('show')}
window.openPanel=async function(t){show();document.getElementById('title').textContent=t==='review'?'AI审图中心':'人员负载';document.getElementById('body').innerHTML='<div class="empty">读取同一套数据库中…</div>';try{await load();t==='review'?renderReview():renderLoad()}catch(e){document.getElementById('body').innerHTML='<div class="warn err">'+esc(e.message||e)+'</div>'}}
function renderLoad(){let rs=rows(),over=rs.filter(r=>r.over).length,near=rs.filter(r=>r.near).length,total=rs.reduce((s,r)=>s+r.count,0);document.getElementById('body').innerHTML='<div class="warn">统计口径：只统计未完结项目；已完工、暂停、取消、归档不计入；总监、主管、老板、离职/停用人员不计入。</div><div class="grid"><div class="card kpi"><small>超载人员</small><b>'+over+'</b></div><div class="card kpi"><small>接近上限</small><b>'+near+'</b></div><div class="card kpi"><small>未完结项目占用</small><b>'+total+'</b></div></div>'+rs.map(r=>'<div class="card"><h3>'+esc(r.name)+' <span class="muted">'+esc(r.role)+'</span></h3><span class="pill '+(r.over?'red':r.near?'gold':'green')+'\">'+(r.over?'过载':r.near?'接近上限':'正常')+'</span><span class="pill\">'+r.count+' / '+r.limit+' 个项目</span><div class="muted">'+(r.over?'建议暂停新增完整项目，优先转派或拆分新项目。':r.near?'建议只安排短任务/低风险任务。':'可正常安排。')+'</div><div class="row muted">'+(r.ps.length?r.ps.map(p=>'· '+esc(p.name)+'｜'+esc(p.role)).join('<br>'):'暂无未完结项目')+'</div></div>').join('')}
window.handleReviewUpload=function(inp){let add=[...(inp.files||[])].map(f=>({name:f.name,size:f.size,time:new Date().toLocaleString(),type:'待审资料'}));data.files=data.files.concat(add);localStorage.setItem('review_files_v2',JSON.stringify(data.files));renderReview()}
window.makeChecklist=function(){let rules=data.rules.map(r=>r.title||r.name||r.rule||r.check_item).filter(Boolean);let base=['核对平面门扇、折叠门、设备开启范围是否冲突','核对灯带、暗扣手、线性灯等连续线条是否漏画或断开','核对水电、排水、地漏、设备点位是否与平面和立面一致','核对高温设备、消防、疏散、雨棚、布艺等安全风险','核对材料标注、收口节点、剖面节点是否能指导施工'];document.getElementById('txt').value=(rules.length?rules:base).map((x,i)=>(i+1)+'. '+x).join('\\n')}
function renderReview(){document.getElementById('body').innerHTML='<div class="warn">审图中心先作为稳定入口：记录导入资料、读取 review_rules 规则表并生成清单框架；正式 PDF 图面识别后续接后端视觉接口。</div><div class="card"><h3>上传审图资料</h3><input type="file" multiple onchange="handleReviewUpload(this)"><div class="muted">支持 PDF / Word / PPT / Excel / 图片等。</div></div><div class="card"><h3>已记录资料</h3>'+(data.files.length?data.files.slice().reverse().map(f=>'<div class="row">'+esc(f.name)+'<div class="muted">'+Math.round((f.size||0)/1024)+' KB｜'+esc(f.time)+'</div></div>').join(''):'<div class="empty">暂无资料</div>')+'</div><div class="card"><h3>规则库</h3><div class="muted">已读取 '+data.rules.length+' 条 review_rules 规则。</div><p><button class="btn" onclick="makeChecklist()">生成审图清单框架</button></p><textarea id="txt" placeholder="点击生成审图清单框架"></textarea></div>'}
function patch(){try{let fd=d();if(fd&&fd.getElementById('mainApp')&&fd.getElementById('mainApp').style.display!=='none')document.getElementById('fab').classList.add('show');fd&&fd.querySelectorAll('button,[onclick]').forEach(el=>{let t=(el.textContent||'')+' '+(el.getAttribute('onclick')||'');if(/报价|quote/i.test(t))el.style.display='none'})}catch(e){}}
frame.addEventListener('load',()=>{setTimeout(patch,1000);setTimeout(patch,2500)});setInterval(patch,2000)
})();
</script></body></html>
