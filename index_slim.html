<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>工时管家轻量版</title>
<link rel="stylesheet" href="slim.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="app">
<header class="top"><div class="brand"><h1 id="title">今日</h1><span>三厘社</span></div></header>
<section class="page active" id="page-today"><h2 class="hero">项目交付<br>今日总览</h2><p class="sub">汇总临近交付、预排确认与人员负载，快速定位需要处理的项目。</p><div class="kpis"><div class="kpi"><small>交付临近</small><b id="kpiDue">0</b></div><div class="kpi"><small>预排待确认</small><b id="kpiPre">0</b></div><div class="kpi"><small>人员过载</small><b id="kpiOver">0</b></div></div><div id="todayList"></div></section>
<section class="page" id="page-delivery"><h2 class="hero">项目交付<br>时间看板</h2><p class="sub">合同项目与预排项目统一展示，按交付节点、负责人和阶段筛选。</p><input class="search" id="projectSearch" placeholder="搜索项目名、负责人、阶段"><div class="pill-row" id="deliveryFilters"><button class="pill active" data-filter="all">全部</button><button class="pill" data-filter="contract">合同内</button><button class="pill" data-filter="pre">预排</button><button class="pill" data-filter="risk">逾期风险</button></div><div id="deliveryList"></div></section>
<section class="page" id="page-people"><h2 class="hero">人员负载<br>项目分布</h2><p class="sub">按在职成员参与的未完结项目统计负载，辅助排期、拆分和调配。</p><div class="pill-row" id="peopleFilters"><button class="pill active" data-role="all">全部</button><button class="pill" data-role="方案">方案</button><button class="pill" data-role="深化">深化</button><button class="pill" data-role="over">过载</button></div><div id="peopleList"></div></section>
<section class="page" id="page-more"><h2 class="hero">工具中心</h2><p class="sub">数据刷新、参考导出、风险建议与系统检测集中管理。</p><div id="moreList"></div></section>
<nav class="bottom"><button class="tab active" data-page="today"><i>●</i>今日</button><button class="tab" data-page="delivery"><i>◷</i>交付</button><button class="tab" data-page="people"><i>◇</i>人员</button><button class="tab" data-page="more"><i>☰</i>更多</button></nav>
<div class="mask" id="mask"></div><div class="sheet" id="sheet"><div class="handle"></div><div id="sheetContent"></div></div><div class="toast" id="toast"></div>
</div>
<script src="slim_remote.js"></script>
<script src="workload_fix.js"></script>
<script src="zh_patch.js"></script>
</body>
</html>
