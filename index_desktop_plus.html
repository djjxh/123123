<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>工时管家 · 电脑端增强版</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#1f2329}#appFrame{width:100%;height:100%;border:0;display:block}.plus-toast{position:fixed;left:50%;top:18px;transform:translate(-50%,-12px);background:#1f2329;color:#fff;border-radius:999px;padding:10px 18px;font:13px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;z-index:20;box-shadow:0 10px 30px rgba(0,0,0,.22);opacity:0;transition:.2s}.plus-toast.show{opacity:1;transform:translate(-50%,0)}.plus-link{position:fixed;right:14px;bottom:14px;z-index:12;background:rgba(255,255,255,.94);border:1px solid #e5e7eb;border-radius:12px;padding:8px 10px;font:12px -apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:#646a73;box-shadow:0 8px 24px rgba(0,0,0,.12)}.plus-link a{color:#3370ff;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<iframe id="appFrame" src="index_reworked.html?v=stable-base-20260507" title="工时管家稳定完整版"></iframe>
<div class="plus-toast" id="plusToast"></div>
<div class="plus-link">增强版入口；若异常，<a href="index_reworked.html?v=stable-login">打开稳定原版</a></div>
<script>
(function(){
  const frame=document.getElementById('appFrame');
  const toastEl=document.getElementById('plusToast');
  const VERSION='20260507-desktop-plus';
  const TERMINAL_RE=/(done|completed|complete|finished|closed|cancelled|canceled|cancel|archived|paused|已完成|完成|已完工|完工|已完结|完结|已结束|结束|结案|已结案|归档|已归档|暂停|已暂停|停滞|取消|已取消|作废|关闭)/i;
  const ACTIVE_RE=/(active|ongoing|construction|risk|进行中|施工跟踪|施工中|方案阶段|施工图阶段|深化阶段|施工阶段|预排|预排中|已确认|未完成|未完工|未完结)/i;
  const STATUS_MAP={'方案阶段':'active','施工图阶段':'active','深化阶段':'active','施工阶段':'construction','施工中':'construction','进行中':'active','预排中':'active','已确认':'active','已完工':'done','已完成':'done','完成':'done','已完结':'done','完结':'done','暂停':'paused','已暂停':'paused','取消':'cancelled','已取消':'cancelled','归档':'done'};
  const STATUS_LABEL={active:'进行中',construction:'施工跟踪',risk:'风险',paused:'已暂停',done:'已完结',cancelled:'已取消'};
  const state={projects:[],employees:[],members:[],stages:{},preplans:[],activeFilter:'active',peopleRole:'all',ready:false};
  function toast(msg){toastEl.textContent=msg;toastEl.classList.add('show');clearTimeout(toastEl._t);toastEl._t=setTimeout(()=>toastEl.classList.remove('show'),2300)}
  function safe(v){return String(v==null?'':v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function txt(v){return String(v==null?'':v).trim()}
  function statusNorm(v){const s=txt(v);return STATUS_MAP[s]||s||'active'}
  function statusLabel(v){const s=statusNorm(v);return STATUS_LABEL[s]||v||'进行中'}
  function getStatus(p){return txt(state.stages[String(p.id)]||p.stage||p.current_stage||p.project_status||p.status||p.state||'active')}
  function isTerminal(p){const s=typeof p==='string'?p:getStatus(p);if(ACTIVE_RE.test(s))return false;return TERMINAL_RE.test(s)}
  function isActiveProject(p){return !isTerminal(p)}
  function roleText(e){return [e.role,e.job_title,e.title,e.position,e.employee_title,e.name].map(txt).join(' ')}
  function isWorkloadEmployee(e){const r=roleText(e);if(e.is_active===false||e.active===false||e.enabled===false)return false;if(/离职|已离职|离任|停用|禁用|不在职|inactive|resigned|departed|disabled|terminated/i.test(r))return false;if(/设计总监|总监|老板|设计主管|主管|admin|administrator|owner|manager|director|系统管理员/i.test(r))return false;return true}
  function limitFor(e){const r=roleText(e);if(/高级深化|深化|施工图|technical/i.test(r))return 4;if(/方案|执行|主案|concept|designer/i.test(r))return 3;return 3}
  function win(){return frame.contentWindow}
  function doc(){return frame.contentDocument}
  function getSB(){const w=win();return w.sb||w.__sbClient||null}
  function mainVisible(){const d=doc();const app=d&&d.getElementById('mainApp');return app&&app.style.display!=='none'}
  function addStyles(){const d=doc();if(!d||d.getElementById('plusStyle'))return;const st=d.createElement('style');st.id='plusStyle';st.textContent=`
    .plus-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:0 0 18px}.plus-stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;box-shadow:var(--shadow)}.plus-stat small{display:block;color:var(--text-sub);font-size:11px;margin-bottom:6px}.plus-stat b{font-family:'DM Mono',monospace;font-size:26px}.plus-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 16px}.plus-pill{border:1px solid var(--border);background:white;border-radius:999px;padding:7px 13px;font-size:12px;cursor:pointer;color:var(--text-sub)}.plus-pill.active{background:var(--ink);color:var(--paper);border-color:var(--ink)}.plus-card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow);padding:15px 16px;margin-bottom:12px}.plus-card h3{font-size:15px;margin:0 0 8px}.plus-meta{font-size:12px;color:var(--text-sub);line-height:1.7}.plus-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.plus-btn{border:0;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer;background:var(--cream);color:var(--ink)}.plus-btn.primary{background:var(--ink);color:var(--paper)}.plus-btn.green{background:var(--green-soft);color:var(--green)}.plus-btn.red{background:var(--accent-soft);color:var(--accent)}.plus-btn.blue{background:var(--blue-soft);color:var(--blue)}.plus-badge{display:inline-block;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:700;background:var(--cream);color:var(--text-sub);margin:0 5px 5px 0}.plus-badge.red{background:var(--accent-soft);color:var(--accent)}.plus-badge.green{background:var(--green-soft);color:var(--green)}.plus-badge.blue{background:var(--blue-soft);color:var(--blue)}.plus-two{display:grid;grid-template-columns:1fr 1fr;gap:16px}.plus-table{width:100%;border-collapse:collapse;font-size:13px}.plus-table th{text-align:left;color:var(--text-sub);font-size:10px;letter-spacing:.08em;padding:9px 10px;border-bottom:2px solid var(--cream)}.plus-table td{padding:10px;border-bottom:1px solid var(--cream);vertical-align:top}.plus-file{border:1px dashed #cbd5e1;border-radius:12px;background:#fbfcfd;padding:14px;width:100%}@media(max-width:900px){.plus-grid,.plus-two{grid-template-columns:1fr}.plus-table{display:table}}`;d.head.appendChild(st)}
  function hideQuote(){const d=doc();if(!d)return;d.querySelectorAll('button,[onclick]').forEach(el=>{const t=(el.textContent||'')+' '+(el.getAttribute('onclick')||'')+' '+(el.dataset&&el.dataset.page||'');if(/报价|quote/.test(t))el.style.display='none'})}
  function addNav(){const d=doc();const w=win();if(!d||d.getElementById('plusDeliveryNav'))return;const nav=d.querySelector('.nav-list');if(!nav)return;const target=nav.querySelector('button[onclick*="project"]')||nav.querySelector('.nav-btn');function btn(id,icon,text,page){const b=d.createElement('button');b.id=id;b.className='nav-btn admin-nav admin-only';b.innerHTML='<span class="icon">'+icon+'</span>'+text;b.onclick=function(){w.plusNav(page,b)};return b}target.after(btn('plusReviewNav','🧪','AI审图中心','plus-review'));target.after(btn('plusPeopleNav','👥','人员负载','plus-people'));target.after(btn('plusDeliveryNav','📅','交付看板','plus-delivery'));w.plusNav=function(page,btnEl){d.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));const p=d.getElementById('page-'+page);if(p)p.classList.add('active');d.querySelectorAll('.nav-btn,.bnav-btn').forEach(b=>b.classList.remove('active'));if(btnEl)btnEl.classList.add('active');const title=d.getElementById('pageTitle');if(title)title.textContent=page==='plus-delivery'?'交付看板':page==='plus-people'?'人员负载':'AI审图中心';const sub=d.getElementById('pageSubtitle');if(sub)sub.textContent='电脑端增强功能，登录层保持稳定原版';if(page==='plus-delivery')renderDelivery();if(page==='plus-people')renderPeople();if(page==='plus-review')renderReview()}}
  function ensurePages(){const d=doc();const content=d&&d.querySelector('.content');if(!content||d.getElementById('page-plus-delivery'))return;content.insertAdjacentHTML('beforeend',`
    <div class="page" id="page-plus-delivery"><div class="admin-only"><div class="notice green">📅 电脑端交付看板：只把进行中项目放在主视图，已完工 / 暂停 / 取消进入“其他”，并且不再参与人员负载。</div><div id="plusDeliveryStats" class="plus-grid"></div><div class="plus-toolbar" id="plusDeliveryFilter"><button class="plus-pill active" data-f="active">进行中</button><button class="plus-pill" data-f="risk">逾期风险</button><button class="plus-pill" data-f="pre">预排</button><button class="plus-pill" data-f="other">其他</button><button class="plus-pill" data-f="all">全部</button></div><div id="plusDeliveryList"><div class="loading"><span class="spinner"></span>加载中…</div></div></div><div class="employee-only"><div class="empty">交付看板仅管理者可见</div></div></div>
    <div class="page" id="page-plus-people"><div class="admin-only"><div class="notice green">👥 人员负载按“未完结参与项目数”统计，排除总监、老板、主管、离职人员；点击员工卡可查看项目明细。</div><div id="plusPeopleStats" class="plus-grid"></div><div class="plus-toolbar" id="plusPeopleFilter"><button class="plus-pill active" data-r="all">全部</button><button class="plus-pill" data-r="方案">方案</button><button class="plus-pill" data-r="深化">深化</button><button class="plus-pill" data-r="over">过载</button></div><div id="plusPeopleList"><div class="loading"><span class="spinner"></span>加载中…</div></div></div><div class="employee-only"><div class="empty">人员负载仅管理者可见</div></div></div>
    <div class="page" id="page-plus-review"><div class="admin-only"><div class="notice green">🧪 审图中心：用于错题资料、待审图纸和人工清单框架管理。这里不伪造图形识别结果，后续真正识别仍应走后端视觉接口。</div><div class="plus-two"><div class="plus-card"><h3>导入历史错题 / 复盘资料</h3><div class="plus-meta">支持 Excel、PDF、Word、PPT、图片等资料；当前先记录文件清单，后续再接后端入库。</div><input class="plus-file" type="file" multiple id="plusReviewHistory"></div><div class="plus-card"><h3>上传待审图纸</h3><div class="plus-meta">用于新图纸审查入口；正式识别后应在 PDF 上生成定位红点。</div><input class="plus-file" type="file" multiple id="plusReviewDrawing"></div></div><div class="plus-actions"><button class="plus-btn primary" id="plusBuildChecklist">生成清单框架</button><button class="plus-btn" id="plusClearReview">清空本机记录</button></div><div id="plusReviewList" style="margin-top:16px"></div></div><div class="employee-only"><div class="empty">AI审图中心仅管理者可见</div></div></div>`)}
  function wire(){const d=doc();if(!d||d.body.dataset.plusWired)return;d.body.dataset.plusWired='1';d.addEventListener('click',e=>{const f=e.target.closest('#plusDeliveryFilter .plus-pill');if(f){state.activeFilter=f.dataset.f;d.querySelectorAll('#plusDeliveryFilter .plus-pill').forEach(x=>x.classList.toggle('active',x===f));renderDelivery()}const r=e.target.closest('#plusPeopleFilter .plus-pill');if(r){state.peopleRole=r.dataset.r;d.querySelectorAll('#plusPeopleFilter .plus-pill').forEach(x=>x.classList.toggle('active',x===r));renderPeople()}const c=e.target.closest('[data-stage-project]');if(c){updateStage(c.dataset.stageProject,c.dataset.stage)}const detail=e.target.closest('[data-person-detail]');if(detail){const el=d.getElementById('personDetail-'+detail.dataset.personDetail);if(el)el.style.display=el.style.display==='none'?'block':'none'}if(e.target.id==='plusBuildChecklist')buildChecklist();if(e.target.id==='plusClearReview'){localStorage.removeItem('plus_review_files');renderReview();toast('已清空本机审图记录')}});d.addEventListener('change',e=>{if(e.target.id==='plusReviewHistory')recordReviewFiles(e.target.files,'历史错题');if(e.target.id==='plusReviewDrawing')recordReviewFiles(e.target.files,'待审图纸')})}
  async function fetchTable(table,select){const sb=getSB();if(!sb)return[];try{const {data,error}=await sb.from(table).select(select||'*');if(error){console.warn(table,error);return[]}return data||[]}catch(e){console.warn(table,e);return[]}}
  async function loadData(){const sb=getSB();if(!sb)return;const [projects,costs,employees,members,stages,preplans]=await Promise.all([fetchTable('projects','*'),fetchTable('project_cost_summary','*'),fetchTable('users','*'),fetchTable('project_members','*'),fetchTable('project_stage_updates','project_id,stage,updated_at'),fetchTable('automation_preplans','*')]);const byId={};costs.forEach(p=>{if(p&&p.id)byId[p.id]=Object.assign({},p)});projects.forEach(p=>{if(p&&p.id)byId[p.id]=Object.assign(byId[p.id]||{},p)});state.projects=Object.values(byId);state.employees=employees;state.members=members;state.preplans=preplans;state.stages={};stages.forEach(s=>{if(s&&s.project_id)state.stages[String(s.project_id)]=s.stage});state.ready=true}
  function deliveryFiltered(){const today=new Date();today.setHours(0,0,0,0);return state.projects.filter(p=>{const active=isActiveProject(p);const deadline=p.deadline||p.contract_deadline||p.delivery_date||p.drawings_delivered_at||p.end_date;let overdue=false;if(deadline){const d=new Date(deadline);d.setHours(0,0,0,0);overdue=active&&d<today}if(state.activeFilter==='active')return active;if(state.activeFilter==='risk')return overdue;if(state.activeFilter==='other')return !active;if(state.activeFilter==='pre')return /预排/.test(getStatus(p))||p.is_preplan||p.source==='preplan';return true}).sort((a,b)=>String(a.deadline||'9999').localeCompare(String(b.deadline||'9999')))}
  function renderDelivery(){const d=doc();if(!d)return;const active=state.projects.filter(isActiveProject);const other=state.projects.filter(p=>!isActiveProject(p));const today=new Date();today.setHours(0,0,0,0);const risk=active.filter(p=>{const dl=p.deadline||p.contract_deadline||p.delivery_date;if(!dl)return false;const x=new Date(dl);x.setHours(0,0,0,0);return x<today}).length;const stats=d.getElementById('plusDeliveryStats');if(stats)stats.innerHTML=`<div class="plus-stat"><small>进行中项目</small><b>${active.length}</b></div><div class="plus-stat"><small>逾期风险</small><b>${risk}</b></div><div class="plus-stat"><small>已归入其他</small><b>${other.length}</b></div>`;const list=d.getElementById('plusDeliveryList');if(!list)return;const arr=deliveryFiltered();if(!arr.length){list.innerHTML='<div class="empty">暂无符合条件的项目</div>';return}list.innerHTML=arr.map(p=>{const st=getStatus(p);const terminal=isTerminal(p);const deadline=p.deadline||p.contract_deadline||p.delivery_date||p.end_date||'—';const badge=terminal?'red':'green';return `<div class="plus-card"><h3>${safe(p.name||p.project_name||'未命名项目')}</h3><div><span class="plus-badge ${badge}">${safe(statusLabel(st))}</span><span class="plus-badge blue">${safe(p.client||p.customer||'')}</span></div><div class="plus-meta">合同/交付时间：${safe(deadline)}　面积：${safe(p.area||p.size||'—')}㎡　合同额：${safe(p.contract_amount||p.amount||'—')}万</div><div class="plus-actions"><button class="plus-btn blue" data-stage-project="${safe(p.id)}" data-stage="方案阶段">方案阶段</button><button class="plus-btn blue" data-stage-project="${safe(p.id)}" data-stage="施工图阶段">施工图阶段</button><button class="plus-btn green" data-stage-project="${safe(p.id)}" data-stage="施工阶段">施工阶段</button><button class="plus-btn red" data-stage-project="${safe(p.id)}" data-stage="已完工">已完工</button><button class="plus-btn" data-stage-project="${safe(p.id)}" data-stage="已暂停">暂停</button></div></div>`}).join('')}
  async function updateStage(projectId,stage){const sb=getSB();if(!sb||!projectId)return;toast('正在同步阶段…');const canonical=statusNorm(stage);try{await sb.from('project_stage_updates').upsert({project_id:projectId,stage:stage,updated_at:new Date().toISOString()},{onConflict:'project_id'})}catch(e){console.warn(e)}try{let ok=false;for(const payload of [{status:canonical,stage:stage,current_stage:stage,project_status:stage},{status:canonical,stage:stage},{status:canonical}]){const {error}=await sb.from('projects').update(payload).eq('id',projectId);if(!error){ok=true;break}}}catch(e){console.warn(e)}state.stages[String(projectId)]=stage;const p=state.projects.find(x=>String(x.id)===String(projectId));if(p){p.status=canonical;p.stage=stage;p.current_stage=stage;p.project_status=stage}toast('已同步到电脑端和手机端');renderDelivery();renderPeople()}
  function collectPersonProjects(e){const eid=String(e.id||'');const ename=txt(e.name||e.email);const rows=[];function push(p,role,src){if(!p||!isActiveProject(p))return;const key=String(p.id||p.project_id||p.name||p.project_name);if(rows.some(x=>x.key===key))return;rows.push({key,name:p.name||p.project_name||p.title||'未命名项目',role:role||p.stage||statusLabel(getStatus(p)),status:statusLabel(getStatus(p)),src:src||'项目'})}state.members.forEach(m=>{if(String(m.employee_id||m.user_id||m.member_id||m.designer_id||'')===eid){const p=state.projects.find(x=>String(x.id)===String(m.project_id));push(p||{id:m.project_id,name:m.project_name,status:m.status},m.job_role||m.role||'项目成员','项目成员')}});state.projects.forEach(p=>{const ids=[p.owner_id,p.employee_id,p.assignee_id,p.designer_id,p.concept_assignee_id,p.technical_assignee_id,p.manager_id,p.responsible_id].filter(Boolean).map(String);const names=[p.owner_name,p.employee_name,p.assignee_name,p.designer_name,p.concept_assignee_name,p.technical_assignee_name,p.responsible_name,p.owner,p.manager].filter(Boolean).map(txt);if(ids.includes(eid)||names.includes(ename))push(p,p.stage||p.current_stage,'项目字段')});state.preplans.forEach(pp=>{const ids=[pp.employee_id,pp.user_id,pp.assignee_id,pp.concept_assignee_id,pp.technical_assignee_id,pp.conceptAssignee,pp.technicalAssignee].filter(Boolean).map(String);const names=[pp.employee_name,pp.assignee_name,pp.concept_assignee_name,pp.technical_assignee_name].filter(Boolean).map(txt);if(ids.includes(eid)||names.includes(ename))push({id:pp.id,name:pp.name||pp.project_name,status:pp.status||'预排中',stage:pp.phase},pp.phase||'预排','人员安排')});return rows}
  function peopleRows(){return state.employees.filter(isWorkloadEmployee).map(e=>{const ps=collectPersonProjects(e);const limit=limitFor(e);const count=ps.length;const over=count>limit;const near=!over&&count>=Math.max(1,limit-1);let suggestion='可正常安排';if(over)suggestion='已超载 '+(count-limit)+' 个：建议暂停新增完整项目，优先转派或拆分新项目。';else if(near)suggestion='接近上限：只安排短任务或低风险任务，避免再加完整项目。';return {e,name:e.name||e.email||'未命名',role:e.job_title||e.title||e.role||'未设置岗位',projects:ps,count,limit,over,near,suggestion}}).filter(r=>{const f=state.peopleRole;if(f==='all')return true;if(f==='over')return r.over;if(f==='方案')return /方案|主案|执行/.test(r.role);if(f==='深化')return /深化|施工图/.test(r.role);return true}).sort((a,b)=>(Number(b.over)-Number(a.over))||(b.count-a.count)||a.name.localeCompare(b.name,'zh'))}
  function renderPeople(){const d=doc();const rows=peopleRows();const all=state.employees.filter(isWorkloadEmployee).map(e=>({e,ps:collectPersonProjects(e),limit:limitFor(e)}));const over=all.filter(x=>x.ps.length>x.limit).length;const near=all.filter(x=>x.ps.length<=x.limit&&x.ps.length>=Math.max(1,x.limit-1)).length;const total=all.reduce((s,x)=>s+x.ps.length,0);const stats=d.getElementById('plusPeopleStats');if(stats)stats.innerHTML=`<div class="plus-stat"><small>执行层人员</small><b>${all.length}</b></div><div class="plus-stat"><small>超载</small><b>${over}</b></div><div class="plus-stat"><small>未完结项目占用</small><b>${total}</b></div>`;const list=d.getElementById('plusPeopleList');if(!list)return;if(!rows.length){list.innerHTML='<div class="empty">暂无人员负载数据</div>';return}list.innerHTML=rows.map(r=>{const id=safe(r.e.id);const badge=r.over?'red':r.near?'blue':'green';const detail=r.projects.length?r.projects.map(p=>`<tr><td>${safe(p.name)}</td><td>${safe(p.role||p.status)}</td><td>${safe(p.src)}</td></tr>`).join(''):'<tr><td colspan="3">暂无未完结参与项目</td></tr>';return `<div class="plus-card"><h3>${safe(r.name)} <span class="plus-badge ${badge}">${r.count} / ${r.limit} 个项目</span></h3><div class="plus-meta">岗位：${safe(r.role)}｜建议：${safe(r.suggestion)}</div><div class="plus-actions"><button class="plus-btn primary" data-person-detail="${id}">查看项目明细</button></div><div id="personDetail-${id}" style="display:none;margin-top:12px"><table class="plus-table"><thead><tr><th>项目</th><th>阶段/角色</th><th>来源</th></tr></thead><tbody>${detail}</tbody></table></div></div>`}).join('')}
  function reviewFiles(){try{return JSON.parse(localStorage.getItem('plus_review_files')||'[]')}catch(e){return[]}}
  function saveReviewFiles(v){localStorage.setItem('plus_review_files',JSON.stringify(v))}
  function recordReviewFiles(files,type){const add=Array.from(files||[]).map(f=>({name:f.name,type,size:f.size,time:new Date().toLocaleString()}));saveReviewFiles(reviewFiles().concat(add));renderReview();toast(add.length?'已记录 '+add.length+' 个文件':'未选择文件')}
  function renderReview(){const d=doc();const box=d.getElementById('plusReviewList');if(!box)return;const files=reviewFiles();if(!files.length){box.innerHTML='<div class="empty">暂无审图资料。可以先导入历史错题或待审图纸。</div>';return}box.innerHTML=files.slice().reverse().map(f=>`<div class="plus-card"><h3>${safe(f.name)}</h3><div class="plus-meta">分类：${safe(f.type)}｜大小：${Math.round((f.size||0)/1024)} KB｜记录时间：${safe(f.time)}</div></div>`).join('')}
  function buildChecklist(){const d=doc();const files=reviewFiles();const base=['核对平面门扇、折叠门、设备开启范围是否冲突','核对灯带、暗扣手、线性灯等连续线条是否漏画或断开','核对水电、排水、地漏、设备点位是否与平面和立面一致','核对高温设备、消防、疏散、雨棚、布艺等安全风险','核对材料标注、收口节点、剖面节点是否能指导施工'];const text='审图清单框架（需人工复核，不代表已完成图形识别）\n\n导入资料：\n'+(files.map(f=>'- '+f.type+'：'+f.name).join('\n')||'- 暂无资料')+'\n\n建议检查项：\n'+base.map((x,i)=>(i+1)+'. '+x).join('\n')+'\n\n下一步：接入后端视觉识别后，应在 PDF 图面上生成红点定位，并允许“确认入库 / 忽略”。';const box=d.getElementById('plusReviewList');if(box)box.innerHTML='<div class="plus-card"><h3>审图清单框架</h3><textarea class="form-input" style="min-height:240px;line-height:1.8">'+safe(text)+'</textarea></div>'+box.innerHTML;toast('已生成清单框架')}
  async function initPlus(){if(!mainVisible())return;addStyles();hideQuote();addNav();ensurePages();wire();await loadData();renderDelivery();renderPeople();renderReview();toast('电脑端增强功能已加载')}
  function boot(){setTimeout(initPlus,400);setTimeout(initPlus,1400);setTimeout(initPlus,3000);setInterval(()=>{if(mainVisible()){hideQuote();if(!state.ready)initPlus()}},4000)}
  frame.addEventListener('load',boot);
})();
</script>
